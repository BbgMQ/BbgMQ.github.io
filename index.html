<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Ranade&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>

<style>
/* === BODY === */
body {
  font-family: 'Ranade', sans-serif;
  margin: 0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
  background-image: url('https://t3.ftcdn.net/jpg/13/73/83/08/360_F_1373830835_pbaKPsXsqoJvULx7dZNsBgmVXBNG3YiW.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: white;
}

/* === CONTAINER === */
.container {
  width: 900px;
  max-width: 95%;
  padding: 60px 20px;
  z-index: 2;
  position: relative;
}

/* === TITLE === */
h1 {
  text-align: center;
  font-size: 70px;
  margin-bottom: 40px;
}

/* === CLICKABLE TITLE === */
.title-link {
  color: white;
  text-decoration: none;
  position: relative;
  display: inline-block;
  transition: all 0.2s ease;
}

.title-link::after,
.title-link::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 3px;
  background: linear-gradient(to right, #2563eb, #1e40af);
  left: 0;
  transform: scaleX(0);
  transition: transform 0.4s ease-out;
}

.title-link::after { bottom: -8px; transform-origin: right; }
.title-link::before { top: -8px; transform-origin: left; }

.title-link:hover::after,
.title-link:hover::before { transform: scaleX(1); }

.title-link:hover {
  text-shadow: 0 0 10px rgba(37, 99, 235, 0.8),
               0 0 20px rgba(30, 64, 175, 0.6);
}

.title-link:active {
  transform: scale(0.96);
  text-shadow: 0 0 5px rgba(37, 99, 235, 0.6);
}

/* === SECTIONS === */
.summary, .form, .transactions {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  margin-bottom: 30px;
  position: relative;
  overflow: visible;
  padding-right: 320px;
  min-height: 240px;
}

/* === TOTALS === */
.totals { display: flex; gap: 15px; }
.totals p {
  flex: 1;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

/* === INPUTS === */
input, select {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 12px;
  margin-top: 12px;
}

input[type="number"]::-webkit-inner-spin-button { opacity: 1; filter: invert(1); }

select option { background: #111; color: white; }

button {
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #1e40af);
  color: white;
  cursor: pointer;
}

ul { list-style: none; padding: 0; }

li {
  background: rgba(255,255,255,0.08);
  padding: 14px;
  border-radius: 12px;
  margin-top: 12px;
  display: flex;
  justify-content: space-between;
}

.income { border-left: 5px solid #10b981; }
.expense { border-left: 5px solid #ef4444; }

/* === HOLOGRAPHIC HOVER === */
.holographic-hover {
  position: relative;
  overflow: hidden;
  transition: 0.5s;
}
.holographic-hover::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(0deg, transparent, transparent 30%, rgba(0,255,255,0.3));
  transform: rotate(-45deg);
  opacity: 0;
}
.holographic-hover:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0,255,255,0.4); }
.holographic-hover:hover::before { opacity: 1; transform: rotate(-45deg) translateY(100%); }

/* === LEFT & RIGHT 3D CUBES BACKGROUND === */
.cube-background {
  position: fixed;
  top: 50%;
  width: 200px;
  height: 200px;
  transform-style: preserve-3d;
  animation: rotateCube 15s linear infinite;
  z-index: -1;
  /* allow mouse interactions */
  pointer-events: all;
  cursor: grab;
}
.cube-background:active {
  cursor: grabbing;
}

.left-cube { left: 10%; transform: translate(0, -50%); }
.right-cube { right: 10%; left: auto; transform: translate(0, -50%); }

.face {
  position: absolute;
  width: 200px;
  height: 200px;
  background: #000;
  border: 2px solid #fff;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 80px;
  font-weight: bold;
  color: #10b981;
}

.front  { transform: rotateY(0) translateZ(100px); }
.back   { transform: rotateY(180deg) translateZ(100px); }
.right  { transform: rotateY(90deg) translateZ(100px); }
.left   { transform: rotateY(-90deg) translateZ(100px); }
.top    { transform: rotateX(90deg) translateZ(100px); }
.bottom { transform: rotateX(-90deg) translateZ(100px); }

@keyframes rotateCube {
  from { transform: rotateX(0deg) rotateY(0deg); }
  to   { transform: rotateX(360deg) rotateY(360deg); }
}

/* === FORCE INPUT TEXT WHITE === */
input { color: white !important; }
input[type="number"] { color: white !important; }
input::placeholder { color: #ffffff; opacity: 1; }
.chart-box {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 260px;
  height: 260px;
  z-index: 10;
}

.chart-box canvas {
  width: 100% !important;
  height: 100% !important;
}
.pie-chart {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  border: 2px solid black;
  background: conic-gradient(#444 0% 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  font-family: sans-serif;
  z-index: 10;
}

.pie-chart h2 {
  position: absolute;
  top: 10px;
  text-align: center;
  width: 100%;
  font-size: 1rem;
}

.pie-chart figcaption {
  position: absolute;
  bottom: 5px;
  right: 5px;
  font-size: smaller;
  text-align: right;
}

.pie-chart cite {
  position: absolute;
  bottom: 5px;
  left: 5px;
  font-size: 70%;
  color: gray;
}

.pie-chart span:after {
  display: inline-block;
  content: "";
  width: 0.6em;
  height: 0.6em;
  margin-left: 0.3em;
  border-radius: 0.2em;
  background: currentColor;
}
.pie-chart {
  background: conic-gradient(#444 0% 100%);
  border-radius: 50%;
  display: block;
}
.pie-key {
  position: absolute;
  top: 10px;
  right: -200px;
  background: rgba(0,0,0,0.35);
  padding: 8px 10px;
  border-radius: 8px;
  color: white;
  font-size: 0.8rem;
  width: max-content;
}
.pie-key .item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.pie-key .swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
.pie-key .label { white-space: nowrap; }
.pie-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: black;
  font-weight: 700;
  text-align: center;
  pointer-events: none;
}
.pie-chart figcaption span:after {
  display: inline-block;
  content: "";
  width: 0.8em;
  height: 0.8em;
  margin-left: 0.4em;
  border-radius: 0.2em;
  background: currentColor;
}
/* legend shown at bottom of the summary box */
#pieLegend {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  color: black;
  text-align: center;
  font-size: 0.9rem;
  z-index: 11;
  width: calc(100% - 40px);
}
#pieLegend .legend-item { display: inline-block; margin: 6px 8px; vertical-align: middle; }
#pieLegend .legend-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }

footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  text-align: center;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  color: white;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s;
}

footer a {
  color: white;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>
<!-- pie/key moved into the summary box so it fits in the middle area -->


<div class="container">
  <h1>
    <a href="https://www.linkedin.com/in/killian-sobol-9b08513a7/" target="_blank" class="title-link">
      Budget Tracker
    </a>
  </h1>

  <div class="summary holographic-hover">
    <h2 id="balanceDisplay">Balance: $0</h2>
    <figure id="spendingPie" class="pie-chart">
      <div id="pieCenter" class="pie-center">No expenses yet</div>
    </figure>
    <div id="pieKey" class="pie-key" aria-label="Category color key"></div>
    <input type="number" id="startingBalance" placeholder="Set starting balance">
    <button id="setBalanceBtn">Set Balance</button>
    <div class="totals">
      <p id="incomeDisplay">Income: $0</p>
      <p id="expensesDisplay">Expenses: $0</p>
    </div>
    <div id="pieLegend"></div>
  </div>

  <div class="form holographic-hover">
    <h3>Add Transaction</h3>
    <input type="text" placeholder="Description" id="descInput">
    <input type="number" placeholder="Amount" id="amountInput">
    <select id="typeSelect">
      <option disabled selected>Type</option>
      <option>Income</option>
      <option>Expense</option>
    </select>
    <select id="categorySelect">
      <option disabled selected>Select a category</option>
      <option>Food</option>
      <option>Housing</option>
      <option>Transportation</option>
      <option>Entertainment</option>
      <option>Utilities</option>
      <option>Shopping</option>
      <option>Health</option>
      <option>Other</option>
    </select>
    <button id="addBtn">Add</button>
  </div>

  <div class="transactions holographic-hover">
    <h3>Transaction History</h3>
    <ul id="transactionList"></ul>
  </div>

  <!-- LEFT CUBE WRAPPER -->
<div class="cube-wrapper">
  <div class="cube-background left-cube">
    <div class="face front">$</div>
    <div class="face back">$</div>
    <div class="face right">$</div>
    <div class="face left">$</div>  
    <div class="face top">$</div>
    <div class="face bottom">$</div>
  </div>
</div>

  <!-- RIGHT CUBE WRAPPER -->
<div class="cube-wrapper">
  <div class="cube-background right-cube">
    <div class="face front">$</div>
    <div class="face back">$</div>
    <div class="face right">$</div>
    <div class="face left">$</div>
    <div class="face top">$</div>
    <div class="face bottom">$</div>
  </div>
</div>

</div>

<footer>
  <a href="about.html" target="_blank">More Information About The Developer</a>
</footer>

<script src="script.js"></script>

</body>
</html>
